apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1-deployment
  namespace: dev
spec:
  replicas: 1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: app1-container
          image: pscala/app1:v1
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: app1-service
  namespace: dev
spec:
  type: LoadBalancers
  selector:
    app: app1
  ports:
    - protocol: TCP
      port: 6666
      targetPort: 80
